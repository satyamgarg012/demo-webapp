apiVersion: apps/v1
kind: Deployment

metadata:
  name: jenkins
  namespace: jenkins

spec:
  replicas: 1

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:

      securityContext:
        fsGroup: 1000

      containers:
      - name: jenkins

        image: jenkins/jenkins:lts
        imagePullPolicy: IfNotPresent

        securityContext:
          runAsUser: 0
          privileged: true

        env:
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=false"

        ports:
        - containerPort: 8080

        - containerPort: 50000

        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

        - name: docker-sock
          mountPath: /var/run/docker.sock

      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-pvc

      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
