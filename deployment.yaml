apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-webapp
spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo-webapp

  template:
    metadata:
      labels:
        app: demo-webapp

    spec:
      containers:
      - name: demo-webapp
        image: demo-webapp:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 80
